name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests, lint, and debug build
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug :app:assembleDebug

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-reports-${{ github.sha }}
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

  deliver:
    name: Deliver ${{ github.ref_name }} package
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    env:
      TRAFFIC_API_BASE_URL: ${{ vars.TRAFFIC_API_BASE_URL }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build development APK
        if: github.ref_name == 'dev'
        shell: bash
        run: |
          api_url="${TRAFFIC_API_BASE_URL:-http://10.0.2.2:8000}"
          ./gradlew --no-daemon :app:assembleDebug -PTRAFFIC_API_BASE_URL="$api_url"

      - name: Validate production delivery settings
        if: github.ref_name == 'main'
        shell: bash
        run: |
          if [[ "$TRAFFIC_API_BASE_URL" != https://* ]]; then
            echo "::error::The production TRAFFIC_API_BASE_URL environment variable must be an HTTPS URL."
            exit 1
          fi

          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing production secret: $name"
              exit 1
            fi
          done

          keystore="$RUNNER_TEMP/release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          echo "ANDROID_KEYSTORE_PATH=$keystore" >> "$GITHUB_ENV"

      - name: Build signed production APK and AAB
        if: github.ref_name == 'main'
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease -PTRAFFIC_API_BASE_URL="$TRAFFIC_API_BASE_URL"

      - name: Upload development APK
        if: github.ref_name == 'dev'
        uses: actions/upload-artifact@v7
        with:
          name: android-dev-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload production APK and AAB
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v7
        with:
          name: android-main-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30
